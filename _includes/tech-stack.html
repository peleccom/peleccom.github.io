<div class="skills-search">
  <i class="fas fa-magnifying-glass"></i>
  <input type="text" id="skill-search" placeholder="Search skills..." aria-label="Search skills" autocomplete="off">
</div>

{% for group in site.data.skills %}
<section class="skills-section">
  <h3 class="skills-section__title">{{ group.section }}</h3>
  <div class="tech-grid">
    {% for skill in group.items %}
    <div class="tech-item" tabindex="0" role="button" data-icon="{{ skill.icon }}" data-description="{{ skill.description | escape }}">
      {% if skill.icon contains "fa-" %}
        <i class="{{ skill.icon }}"></i>
      {% else %}
        <img class="tech-item__icon" src="{{ site.developer_icons_cdn }}/{{ skill.icon }}.svg" alt="{{ skill.name }}" loading="lazy" width="40" height="40">
      {% endif %}
      <span>{{ skill.name }}</span>
    </div>
    {% endfor %}
  </div>
</section>
{% endfor %}

<div class="skill-modal" id="skill-modal" hidden>
  <div class="skill-modal__backdrop" data-close></div>
  <div class="skill-modal__card" role="dialog" aria-modal="true" aria-labelledby="skill-modal-title">
    <button class="skill-modal__close" data-close aria-label="Close">&times;</button>
    <span class="skill-modal__icon" id="skill-modal-icon"></span>
    <h3 class="skill-modal__title" id="skill-modal-title"></h3>
    <p class="skill-modal__desc" id="skill-modal-desc"></p>
  </div>
</div>

<script>
(function () {
  var modal = document.getElementById('skill-modal');
  document.body.appendChild(modal);
  var modalIcon = document.getElementById('skill-modal-icon');
  var modalTitle = document.getElementById('skill-modal-title');
  var modalDesc = document.getElementById('skill-modal-desc');
  var search = document.getElementById('skill-search');

  function openModal(item) {
    var di = item.getAttribute('data-icon') || '';
    modalIcon.innerHTML = '';
    if (di.indexOf('fa-') !== -1) {
      var fi = document.createElement('i');
      fi.className = 'skill-modal__icon ' + di;
      modalIcon.appendChild(fi);
    } else {
      var im = document.createElement('img');
      im.className = 'skill-modal__icon';
      im.src = '{{ site.developer_icons_cdn }}/' + di + '.svg';
      im.alt = modalTitle.textContent;
      modalIcon.appendChild(im);
    }
    modalTitle.textContent = item.querySelector('span').textContent;
    var desc = item.getAttribute('data-description') || '';
    modalDesc.textContent = desc;
    modalDesc.style.display = desc ? '' : 'none';
    modal.hidden = false;
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    modal.hidden = true;
    document.body.style.overflow = '';
  }

  document.querySelectorAll('.tech-item').forEach(function (item) {
    item.addEventListener('click', function () { openModal(item); });
    item.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(item); }
    });
  });

  modal.querySelectorAll('[data-close]').forEach(function (el) {
    el.addEventListener('click', closeModal);
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && !modal.hidden) closeModal();
  });

  if (search) {
    search.addEventListener('input', function () {
      var q = search.value.trim().toLowerCase();
      document.querySelectorAll('.skills-section').forEach(function (section) {
        var items = section.querySelectorAll('.tech-item');
        var visible = 0;
        items.forEach(function (item) {
          var label = item.querySelector('span').textContent.toLowerCase().replace(/[^a-z0-9]/g, '');
          var match = !q || label.indexOf(q.replace(/[^a-z0-9]/g, '')) !== -1;
          item.style.display = match ? '' : 'none';
          if (match) visible++;
        });
        section.style.display = visible === 0 ? 'none' : '';
      });
    });
  }
})();
</script>
