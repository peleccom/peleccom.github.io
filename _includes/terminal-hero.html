{% assign active = site.data.terminal.active_scheme | default: "default" %}
{% assign tc = site.data.terminal.schemes[active] %}
{% assign cfg = site.data.terminal %}

<div class="terminal" id="terminal"
     style="--terminal-bg: {{ tc.background }}; --terminal-bar-bg: {{ tc.bar_background }}; --terminal-text: {{ tc.text }}; --terminal-prompt: {{ tc.prompt }}; --terminal-output: {{ tc.output }}; --terminal-cmd: {{ tc.cmd }}; --terminal-cursor: {{ tc.cursor }}; --terminal-title: {{ tc.title }};">
  <div class="terminal__bar">
    <span class="terminal__dot terminal__dot--red"></span>
    <span class="terminal__dot terminal__dot--yellow"></span>
    <span class="terminal__dot terminal__dot--green"></span>
    <span class="terminal__title">{{ cfg.title }}</span>
    <select class="terminal__scheme-select" id="schemeSelect">
      {% for s in site.data.terminal.schemes %}
      <option value="{{ s[0] }}"{% if s[0] == active %} selected{% endif %}>{{ s[0] }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="terminal__body">
    <div id="terminal-output"></div>
  </div>
</div>

<!-- Pass config from Liquid to JS -->
<script>
  window.TERMINAL_CONFIG = {{ site.data.terminal | jsonify }};
</script>

<!-- jQuery Terminal (jQuery is provided by the theme) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery.terminal@2.46.1/css/jquery.terminal.min.css" />
<script src="https://cdn.jsdelivr.net/npm/jquery.terminal@2.46.1/js/jquery.terminal.min.js"></script>

<script src="{{ '/assets/js/terminal.js' | relative_url }}"></script>
