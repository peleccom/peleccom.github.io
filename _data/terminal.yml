title: terminal
prompt: ">"
start_delay: 400
between_lines_delay: 300
after_output_delay: 200
show_final_cursor: true
cursor_blink_speed: 500
active_scheme: default
schemes:
  default:
    background: "#1e1e1e"
    bar_background: "#2d2d2d"
    text: "#f8f8f2"
    prompt: "#00ff00"
    cmd: "#f8f8f2"
    output: "#66d9ef"
    cursor: "#f8f8f2"
    title: "#999"
  ubuntu:
    background: "#300a24"
    bar_background: "#3f1b34"
    text: "#e8e8e8"
    prompt: "#4e9a06"
    cmd: "#ffffff"
    output: "#73d216"
    cursor: "#ffffff"
    title: "#c0a0b0"
  dracula:
    background: "#282a36"
    bar_background: "#21222c"
    text: "#f8f8f2"
    prompt: "#50fa7b"
    cmd: "#f8f8f2"
    output: "#8be9fd"
    cursor: "#f8f8f2"
    title: "#6272a4"
  monokai:
    background: "#272822"
    bar_background: "#1e1f1c"
    text: "#f8f8f2"
    prompt: "#a6e22e"
    cmd: "#f8f8f2"
    output: "#66d9ef"
    cursor: "#f8f8f2"
    title: "#75715e"
  light:
    background: "#f5f5f5"
    bar_background: "#e0e0e0"
    text: "#333333"
    prompt: "#2e7d32"
    cmd: "#1a1a1a"
    output: "#1565c0"
    cursor: "#1a1a1a"
    title: "#666666"
lines:
  - cmd: whoami
    output: Alexander Pitkin
    speed: 30
  - cmd: cat role
    output: "Senior Python Developer | Senior Full Stack Engineer | FastAPI, Django | TypeScript, React, Angular | AI Engineer | LLM Applications"
    speed: 8
  - cmd: cat stack
    output: "Python · TypeScript · FastAPI · Django · React · Angular"
    speed: 20
