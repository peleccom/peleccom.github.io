- section: "Language / Programming"
  items:
    - name: "Python"
      icon: "python"
      description: "High-level, interpreted language prized for readable syntax and used widely in web development, data science, and automation."
    - name: "JavaScript / TS"
      icon: "javascript"
      description: "JavaScript is the web's scripting language; TypeScript is its typed superset that compiles to JS for safer large-scale apps."
    - name: "TypeScript"
      icon: "typescript"
      description: "Typed superset of JavaScript that compiles to plain JS, adding static types, interfaces, and modern tooling for scalable applications."
    - name: "Bash"
      icon: "bash"
      description: "Unix shell and command language for scripting and automating tasks in Linux and macOS terminals."
    - name: "CSS / SASS / LESS / Stylus"
      icon: "css"
      description: "CSS styles and lays out web pages; Sass, LESS, and Stylus are preprocessors adding variables, nesting, mixins, and functions to CSS."
    - name: "HTML"
      icon: "html5"
      description: "Standard markup language for structuring and presenting content on the World Wide Web."
    - name: "SQL"
      icon: "fas fa-database"
      description: "Declarative language for querying, inserting, updating, and managing data in relational database systems."
    - name: "Go"
      icon: "go"
      description: "Statically typed, compiled language by Google emphasizing simplicity, built-in concurrency, and fast builds for backend services."
    - name: "C / C++ / C#"
      icon: "c-plus-plus"
      description: "Systems and application languages: C for low-level, C++ adding OOP, and C# for the .NET ecosystem."
    - name: "Java"
      icon: "java"
      description: "Object-oriented, platform-independent language running on the JVM, widely used for enterprise and Android applications."
    - name: "Delphi"
      icon: "fas fa-cogs"
      description: "Rapid application development IDE and Object Pascal dialect for building native Windows and cross-platform GUI apps."
    - name: "Dart"
      icon: "dart"
      description: "Client-optimized, strongly typed language by Google used mainly with the Flutter framework for cross-platform apps."
    - name: "DSA"
      icon: "fas fa-diagram-project"
      description: "Data Structures & Algorithms — fundamental computer science concepts including arrays, trees, graphs, sorting, searching, and dynamic programming for solving complex problems efficiently."

- section: "Frameworks / Technology"
  items:
    - name: "Django"
      icon: "django"
      description: "High-level Python web framework with batteries-included tooling for rapid, secure, and maintainable web development."
    - name: "Django REST Framework (DRF)"
      icon: "fas fa-server"
      description: "Powerful toolkit for building RESTful APIs on top of Django, with serialization, authentication, and a browsable API."
    - name: "AngularJS / 2+"
      icon: "angular"
      description: "Google's JavaScript and TypeScript frameworks for building single-page web applications with declarative components."
    - name: "React"
      icon: "reactjs"
      description: "JavaScript library by Meta for building component-based user interfaces using a virtual DOM."
    - name: "FastAPI"
      icon: "fast-api"
      description: "Modern Python web framework using async/await and type hints to build fast REST APIs with automatic docs."
    - name: "Flask"
      icon: "flask-dark"
      description: "Lightweight Python micro-framework for building web apps and APIs with minimal boilerplate."
    - name: "Huey"
      icon: "fas fa-clock"
      description: "Lightweight Python task queue using Redis or filesystem for scheduling and executing background tasks asynchronously."
    - name: "SQLAlchemy / Alembic / GeoAlchemy"
      icon: "python"
      description: "Python SQL toolkit and ORM that maps Python objects to database tables; Alembic handles schema migrations and GeoAlchemy adds geospatial queries."
    - name: "NodeJS"
      icon: "nodejs"
      description: "JavaScript runtime built on V8 that executes JS server-side for scalable network and backend applications."
    - name: "RxJS"
      icon: "javascript"
      description: "Reactive Extensions library for JavaScript implementing observable streams and operators for asynchronous event handling."
    - name: "React Native"
      icon: "reactjs"
      description: "Framework using React to build native iOS and Android mobile apps from a single JavaScript/TypeScript codebase."
    - name: "Redux"
      icon: "redux"
      description: "Predictable state container for JavaScript apps, commonly used with React for managing application state."
    - name: "Android SDK"
      icon: "android"
      description: "Google's collection of libraries and tools for building, testing, and debugging applications on the Android platform."
    - name: "Flutter"
      icon: "flutter"
      description: "UI toolkit by Google for crafting natively compiled, multi-platform apps from a single Dart codebase."
    - name: "Langchain/Langgraph"
      icon: "openai"
      description: "Frameworks for building LLM-powered apps, with LangGraph adding stateful, graph-based agent workflows."
    - name: "System Design"
      icon: "fas fa-sitemap"
      description: "Practice of designing scalable, reliable, and maintainable distributed systems including microservices, databases, caching, load balancing, and API architecture."

- section: "Systems"
  items:
    - name: "Linux"
      icon: "linux"
      description: "Open-source Unix-like operating system kernel powering servers, desktops, and embedded systems worldwide."
    - name: "Windows"
      icon: "microsoft"
      description: "Microsoft's graphical operating system for personal computers, laptops, and servers."
    - name: "MacOS"
      icon: "apple-dark"
      description: "Apple's Unix-based operating system for Mac computers, known for its polished graphical interface."

- section: "Cloud & CI/CD"
  items:
    - name: "AWS"
      icon: "aws"
      description: "Amazon's cloud platform offering on-demand compute, storage, and managed services over the internet."
    - name: "Google Cloud Platform (GCP)"
      icon: "google-cloud"
      description: "Google Cloud Platform providing global cloud computing, storage, and machine-learning services."
    - name: "CircleCI"
      icon: "circleci"
      description: "Cloud-native CI/CD service that automates building, testing, and deploying code via configurable YAML pipelines."
    - name: "GitLab CI"
      icon: "gitlab"
      description: "GitLab's built-in continuous integration and delivery tool that runs pipelines defined in .gitlab-ci.yml."
    - name: "GitHub Actions"
      icon: "fab fa-github"
      description: "GitHub's automation platform for CI/CD and workflow orchestration triggered by repository events."
    - name: "Docker / Docker Compose"
      icon: "docker"
      description: "Platform for packaging applications into portable containers that run consistently across environments; Docker Compose defines and runs multi-container apps from a single YAML file."
    - name: "Kubernetes"
      icon: "kubernetes"
      description: "Container orchestration system automating deployment, scaling, and management of containerized applications."
    - name: "Helm"
      icon: "fas fa-ship"
      description: "Package manager for Kubernetes that defines and deploys applications via reusable, templated charts."
    - name: "Drone CI"
      icon: "fas fa-sync"
      description: "Container-native continuous integration and delivery platform that runs pipelines as Docker containers."

- section: "Databases / Message brokers"
  items:
    - name: "PostgreSQL"
      icon: "postgresql"
      description: "Advanced open-source object-relational database known for standards compliance, extensibility, and reliability."
    - name: "MSSQL"
      icon: "microsoft-sql-server"
      description: "Microsoft's enterprise relational database management system with strong transactional and analytical support."
    - name: "MySQL"
      icon: "mysql"
      description: "Popular open-source relational database widely used as the backend for web applications."
    - name: "Pandas"
      icon: "fas fa-table"
      description: "Python library providing fast, flexible data structures for data analysis, cleaning, and manipulation."
    - name: "Redis"
      icon: "redis"
      description: "In-memory key-value store used for caching, sessions, and real-time data with very low latency."
    - name: "RabbitMQ"
      icon: "kafka"
      description: "Open-source message broker implementing AMQP for reliable, asynchronous communication between services."
    - name: "Memcached"
      icon: "fas fa-memory"
      description: "High-performance distributed in-memory caching system for speeding up database-driven websites."
    - name: "ZeroMQ"
      icon: "fas fa-network-wired"
      description: "High-performance asynchronous messaging library for building distributed or concurrent applications."
    - name: "ElasticSearch"
      icon: "elastic"
      description: "Distributed search and analytics engine built on Lucene for full-text search and log analysis."
    - name: "DynamoDB"
      icon: "aws"
      description: "Amazon's fully managed NoSQL key-value and document database with seamless, single-digit-millisecond scaling."
    - name: "MongoDB"
      icon: "mongodb"
      description: "Document-oriented NoSQL database storing data in flexible, JSON-like BSON documents."

- section: "Project / Task Management"
  items:
    - name: "JIRA"
      icon: "jira"
      description: "Atlassian's issue-tracking and agile project management tool for planning and tracking software work."
    - name: "Asana"
      icon: "atlassian"
      description: "Web and mobile application for team task, project, and workflow management and collaboration."
    - name: "Trello"
      icon: "fab fa-trello"
      description: "Kanban-style project management app using boards, lists, and cards for visual task tracking."
    - name: "Linear"
      icon: "fas fa-chart-line"
      description: "Modern issue-tracking and project management tool designed around fast software-team workflows."

